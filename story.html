<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Match AR! - Story</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-border: #4a5d23;
            --pixel-bg: #f5f7d1;
            --pixel-accent: #a8d56f;
            --pixel-text: #2d4a22;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            image-rendering: pixelated;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: var(--pixel-bg);
            font-family: 'VT323', monospace;
            touch-action: manipulation;
        }

        /* 背景：讀取您上傳的 background.png */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('background.png') no-repeat center center;
            background-size: cover;
            /* 輕微調亮以匹配淺色調風格 */
            filter: brightness(1.05);
            z-index: -1;
        }

        .character-container {
            position: absolute;
            bottom: 25vh;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 5%;
            pointer-events: none; 
            z-index: 5;
        }

        .character {
            width: 45vw;
            max-width: 280px;
            height: auto;
            transition: all 0.2s steps(2);
            filter: brightness(0.6) grayscale(0.4);
            transform: scale(0.9);
            opacity: 0.8;
        }

        .character.active {
            filter: brightness(1) grayscale(0);
            transform: scale(1.1);
            opacity: 1;
            z-index: 10;
        }

        .pixel-dialogue {
            position: absolute;
            bottom: 30px;
            left: 5%;
            width: 90%;
            min-height: 130px;
            background: rgba(255, 254, 240, 0.98);
            border: 4px solid var(--pixel-border);
            box-shadow: 
                0 4px 0 -1px var(--pixel-border),
                0 -4px 0 -1px var(--pixel-border),
                4px 0 0 -1px var(--pixel-border),
                -4px 0 0 -1px var(--pixel-border);
            padding: 15px;
            z-index: 20;
        }

        .name-tag {
            font-size: 24px;
            color: white;
            background: var(--pixel-accent);
            padding: 2px 12px;
            border: 2px solid var(--pixel-border);
            position: absolute;
            top: -20px;
            left: 10px;
        }

        .message {
            font-size: 28px;
            color: var(--pixel-text);
            line-height: 1.1;
            margin-top: 5px;
        }

        .next-hint {
            position: absolute;
            right: 15px;
            bottom: 10px;
            font-size: 20px;
            color: var(--pixel-accent);
            animation: bounce 0.6s steps(2) infinite;
        }

        @keyframes bounce { 
            0% { transform: translateY(0); } 
            100% { transform: translateY(4px); } 
        }

        #summary-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--pixel-bg);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 100;
        }

        .mission-box {
            border: 6px solid var(--pixel-border);
            background: white;
            padding: 25px;
            width: 85%;
            text-align: center;
            box-shadow: 6px 6px 0 var(--pixel-border);
        }

        .mission-title { font-size: 36px; color: #d32f2f; margin-bottom: 15px; }
        .mission-text { font-size: 24px; color: var(--pixel-text); line-height: 1.3; margin-bottom: 30px; }
        
        .btn-start {
            font-family: 'VT323', monospace;
            font-size: 34px;
            background: var(--pixel-accent);
            color: white;
            border: 3px solid var(--pixel-border);
            padding: 12px 45px;
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--pixel-border);
            position: relative;
            z-index: 110;
        }
    </style>
</head>
<body onclick="handleScreenClick()">

    <div class="background"></div>

    <div class="character-container">
        <img id="chitu" class="character" src="chi-tu01-norm.png">
        <img id="shuchong" class="character" src="shu-chong01-norm.png">
    </div>

    <div class="pixel-dialogue" id="dialogue-box">
        <div class="name-tag" id="speaker-name">遲兔</div>
        <div class="message" id="message-text">...</div>
        <div class="next-hint">TAP TO NEXT ➔</div>
    </div>

    <div id="summary-screen">
        <div class="mission-box">
            <h1 class="mission-title">MISSION BRIEF</h1>
            <p class="mission-text">
                CHI TU is late again!<br>
                He's turned into an object in the <b>GATE AREA</b>.<br><br>
                <b>Find the real CHI TU!</b>
            </p>
            <button class="btn-start" onclick="event.stopPropagation(); window.location.href='camera_game.html'">START ➔</button>
        </div>
    </div>

    <script>
        const story = [
            { name: "遲兔", text: "I'm late! I'm late! Oh no no no!!!", active: "chitu" },
            { name: "主角（書蟲）", text: "Wait! What happened to you?", active: "shuchong" },
            { name: "遲兔", text: "I'm so late... help me get back!", active: "chitu" }
        ];

        let currentLine = 0;
        let storyFinished = false;

        function updateUI() {
            if (currentLine < story.length) {
                const line = story[currentLine];
                document.getElementById('speaker-name').innerText = line.name;
                document.getElementById('message-text').innerText = line.text;
                document.getElementById('chitu').classList.toggle('active', line.active === 'chitu');
                document.getElementById('shuchong').classList.toggle('active', line.active === 'shuchong');
            } else {
                storyFinished = true;
                document.getElementById('dialogue-box').style.display = 'none';
                document.getElementById('summary-screen').style.display = 'flex';
            }
        }

        function handleScreenClick() {
            if (!storyFinished) {
                currentLine++;
                updateUI();
            }
        }

        window.onload = updateUI;
    </script>
</body>
</html>
