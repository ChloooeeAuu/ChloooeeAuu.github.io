<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Match AR! - MULTIPLAYER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            font-family: 'Orbitron', sans-serif;
            background: #000;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }

        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, 
                rgba(0,0,0,0.95) 0%, 
                rgba(20,20,20,0.9) 100%);
            z-index: -2;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 10;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 15px;
            padding-bottom: 30px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #ff3333;
            margin-bottom: 15px;
            position: relative;
            font-size: 14px;
            flex-shrink: 0;
        }

        .status-bar::before {
            content: 'ROOM';
            position: absolute;
            top: -8px;
            left: 10px;
            background: #000;
            padding: 0 8px;
            color: #ff3333;
            font-size: 10px;
            letter-spacing: 1px;
        }

        .level-info {
            display: flex;
            gap: 15px;
        }

        .level-badge {
            color: #ff3333;
            font-weight: 700;
        }

        .phase-badge {
            color: #fff;
            font-weight: 700;
        }

        .timer {
            font-size: 24px;
            font-weight: 900;
            color: #ff3333;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.8);
        }

        .timer.warning {
            animation: pulse 0.5s infinite;
        }

        /* Step Indicator */
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #ff3333;
            flex-shrink: 0;
        }

        .step {
            flex: 1;
            text-align: center;
            padding: 5px;
            color: #666;
            position: relative;
            font-size: 12px;
        }

        .step.active {
            color: #ff3333;
            font-weight: 700;
        }

        .step.completed {
            color: #00ff00;
        }

        .step:not(:last-child)::after {
            content: '→';
            position: absolute;
            right: -5px;
            color: #ff3333;
            font-size: 12px;
        }

        /* Camera Init Button */
        .camera-init {
            text-align: center;
            padding: 40px 20px;
            border: 2px solid #ff3333;
            background: rgba(0, 0, 0, 0.9);
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .camera-init button {
            width: 100%;
            max-width: 280px;
            padding: 18px 20px;
            font-size: 18px;
            border: 3px solid #ff3333;
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            margin: 0 auto;
            display: block;
        }

        .camera-init button:active {
            background: #ff3333;
            color: black;
            transform: scale(0.95);
        }

        .camera-init button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .camera-init p {
            margin-top: 15px;
            color: #ff3333;
            font-size: 12px;
        }

        /* Game Main Area */
        .game-main {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 15px;
            flex: 1;
        }

        .question-area, .camera-area {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ff3333;
            padding: 15px;
            position: relative;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 16px;
            color: #ff3333;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .section-title span:last-child {
            margin-left: auto;
            font-size: 14px;
        }

        .image-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #111;
            border: 1px solid #ff3333;
            overflow: hidden;
            margin-bottom: 10px;
            position: relative;
        }

        .image-container img, #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #video {
            display: none;
        }

        #video.visible {
            display: block;
        }

        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            background: #0a0a0a;
            font-size: 14px;
        }

        .placeholder i {
            font-size: 40px;
            margin-bottom: 10px;
            color: #ff3333;
            opacity: 0.5;
        }

        /* Similarity Meter */
        .similarity-meter {
            margin-top: 10px;
            padding: 12px;
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid #ff3333;
        }

        .meter-label {
            color: #ff3333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .meter-bar {
            width: 100%;
            height: 12px;
            background: #111;
            border: 1px solid #ff3333;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            transition: width 0.3s ease;
        }

        .meter-fill.perfect { background: #00ff00; }
        .meter-fill.good { background: #ff9900; }
        .meter-fill.poor { background: #ff3333; }

        #similarityText {
            text-align: center;
            margin-top: 8px;
            color: #ff3333;
            font-size: 14px;
        }

        /* Control Buttons */
        .game-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
            flex-shrink: 0;
        }

        .btn {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #ff3333;
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            -webkit-appearance: none;
        }

        .btn:active {
            background: #ff3333;
            color: black;
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn.small {
            padding: 10px;
            font-size: 14px;
        }

        .photo-actions {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .photo-actions .btn {
            flex: 1;
            padding: 12px;
            font-size: 15px;
        }

        /* Players Section */
        .players-section {
            margin-top: 15px;
            padding: 15px;
            border: 1px solid #ff3333;
            background: rgba(0, 0, 0, 0.9);
            flex-shrink: 0;
        }

        .players-section h3 {
            color: #ff3333;
            margin-bottom: 12px;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-code {
            color: #ff9900;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .player-card {
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid #ff3333;
            padding: 10px;
            text-align: center;
            position: relative;
        }

        .player-card.current {
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
        }

        .player-card.waiting {
            opacity: 0.5;
        }

        .player-avatar {
            width: 35px;
            height: 35px;
            background: #ff3333;
            border-radius: 50%;
            margin: 0 auto 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: black;
        }

        .player-name {
            font-weight: 700;
            margin-bottom: 3px;
            font-size: 12px;
        }

        .player-status {
            color: #ff9900;
            font-size: 10px;
        }

        .player-status.ready {
            color: #00ff00;
        }

        /* Challenge Queue */
        .challenge-queue {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 51, 51, 0.05);
            border: 1px solid #ff3333;
        }

        .queue-title {
            color: #ff3333;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .queue-items {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .queue-item {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 1px solid #ff3333;
        }

        .queue-item.active {
            border-color: #00ff00;
            animation: pulse 1s infinite;
        }

        /* Result Box */
        .result-box {
            text-align: center;
            padding: 15px;
            border: 2px solid #ff3333;
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.9);
        }

        .result-message {
            color: #ff3333;
            font-size: 18px;
        }

        .score {
            font-size: 36px;
            color: #ff3333;
            margin: 10px 0;
            font-weight: 900;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ff3333;
            color: white;
            padding: 15px 25px;
            font-size: 16px;
            z-index: 1000;
            display: none;
            text-align: center;
            width: 80%;
            max-width: 280px;
        }

        .toast.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        /* Back Button */
        .back-button {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
        }

        .back-button a {
            color: #ff3333;
            text-decoration: none;
            border: 1px solid #ff3333;
            padding: 8px 12px;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.8);
            display: inline-block;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .shake {
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Status Colors */
        #cameraStatus.online {
            color: #00ff00;
        }

        #cameraStatus.offline {
            color: #ff3333;
        }

        /* Safe Area */
        @supports (padding: max(0px)) {
            .game-container {
                padding-left: max(15px, env(safe-area-inset-left));
                padding-right: max(15px, env(safe-area-inset-right));
                padding-top: max(15px, env(safe-area-inset-top));
                padding-bottom: max(15px, env(safe-area-inset-bottom));
            }
            
            .back-button {
                top: max(15px, env(safe-area-inset-top));
                left: max(15px, env(safe-area-inset-left));
            }
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="scan-line"></div>

    <!-- Back Button -->
    <div class="back-button">
        <a href="index.html">← BACK</a>
    </div>

    <div class="game-container">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="level-info">
                <div class="level-badge" id="currentLevel">ROOM</div>
                <div class="phase-badge" id="phaseIndicator">WAITING</div>
            </div>
            <div class="timer" id="timer">--</div>
        </div>

        <!-- Camera Init Button -->
        <div class="camera-init" id="cameraInit">
            <button onclick="joinRoom()" id="cameraInitBtn">
                ▶ JOIN MULTIPLAYER ROOM
            </button>
            <p>// CONNECT WITH REAL PLAYERS //</p>
        </div>

        <!-- Step Indicator -->
        <div class="step-indicator" id="stepIndicator" style="display: none;">
            <div class="step" id="step1">WAITING</div>
            <div class="step" id="step2">CHALLENGE</div>
            <div class="step" id="step3">CAPTURE</div>
            <div class="step" id="step4">SUBMIT</div>
            <div class="step" id="step5">SCORE</div>
        </div>

        <!-- Game Main Area -->
        <div class="game-main" id="gameMain" style="display: none;">
            <!-- Question Area -->
            <div class="question-area">
                <div class="section-title">
                    <span>> CURRENT CHALLENGE</span>
                    <span id="questionOwner"></span>
                </div>
                <div class="image-container" id="targetImage">
                    <img id="targetImg" src="" alt="CHALLENGE" style="display: none;">
                    <div class="placeholder" id="targetPlaceholder">
                        <i>👥</i>
                        <p>WAITING FOR PLAYERS...</p>
                    </div>
                </div>

                <!-- Challenge Queue -->
                <div class="challenge-queue" id="challengeQueue" style="display: none;">
                    <div class="queue-title">CHALLENGES QUEUE</div>
                    <div class="queue-items" id="queueItems"></div>
                </div>

                <!-- Similarity Meter -->
                <div class="similarity-meter" id="similarityMeter" style="display: none;">
                    <div class="meter-label">MATCH RATE</div>
                    <div class="meter-bar">
                        <div class="meter-fill" id="similarityFill" style="width: 0%"></div>
                    </div>
                    <div id="similarityText">0%</div>
                </div>

                <!-- Result Box -->
                <div class="result-box" id="resultBox" style="display: none;">
                    <div class="result-message" id="resultMessage"></div>
                    <div class="score" id="scoreDisplay">0</div>
                </div>
            </div>

            <!-- Camera Area -->
            <div class="camera-area">
                <div class="section-title">
                    <span>> YOUR CAMERA</span>
                    <span id="cameraStatus" class="offline">OFFLINE</span>
                </div>
                <div class="image-container">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas" style="display: none;"></canvas>
                    <div class="placeholder" id="cameraPlaceholder">
                        <i>📷</i>
                        <p>CAMERA OFFLINE</p>
                    </div>
                </div>

                <!-- Photo Preview -->
                <div class="image-container" id="photoPreviewContainer" style="display: none;">
                    <div class="section-title">> YOUR SHOT</div>
                    <img id="photoPreview" src="" alt="YOUR SHOT" style="width: 100%; height: 100%; object-fit: cover;">
                </div>

                <!-- Photo Actions -->
                <div class="photo-actions">
                    <button class="btn" id="takePhotoBtn" onclick="takePhoto()" disabled>📸 CAPTURE</button>
                    <button class="btn" id="submitPhotoBtn" onclick="submitPhoto()" disabled style="display: none;">⬆ SUBMIT</button>
                </div>
            </div>
        </div>

        <!-- Game Control Buttons -->
        <div class="game-controls" id="gameControls" style="display: none;">
            <button class="btn" id="nextChallengeBtn" onclick="nextChallenge()" style="display: none;">⏭ NEXT CHALLENGE</button>
        </div>

        <!-- Players Section -->
        <div class="players-section" id="playersSection" style="display: none;">
            <h3>
                <span>> ROOM (MAX 4)</span>
                <span class="room-code" id="roomCode">ROOM-001</span>
            </h3>
            <div class="players-grid" id="playersList"></div>
        </div>
    </div>

    <!-- Toast Message -->
    <div id="toast" class="toast"></div>

    <script>
        // Game Configuration
        const GAME_CONFIG = {
            maxPlayers: 4,
            challengeTime: 45,
            similarityThreshold: 70,
            goodThreshold: 85,
            perfectThreshold: 95,
            roomPrefix: 'AR'
        };

        // Game State
        let gameState = {
            roomId: null,
            playerId: null,
            playerName: null,
            phase: 'idle',
            timer: 0,
            timerInterval: null,
            currentChallenge: null,
            currentPhoto: null,
            players: [],
            challenges: [], // 其他玩家出的題目
            challengeQueue: [],
            currentChallengeIndex: 0,
            camera: null,
            cameraActive: false,
            lastResult: null,
            score: 0
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            generateRoomId();
        });

        // Generate random room ID
        function generateRoomId() {
            const randomNum = Math.floor(Math.random() * 900 + 100);
            gameState.roomId = GAME_CONFIG.roomPrefix + '-' + randomNum;
            document.getElementById('roomCode').textContent = gameState.roomId;
        }

        // Generate random player name
        function generatePlayerName() {
            const names = ['HUNTER', 'NEO', 'GHOST', 'VIPER', 'PHANTOM', 'SHADOW'];
            const randomName = names[Math.floor(Math.random() * names.length)];
            const randomNum = Math.floor(Math.random() * 100);
            return randomName + randomNum;
        }

        // Join multiplayer room
        async function joinRoom() {
            const joinBtn = document.getElementById('cameraInitBtn');
            joinBtn.disabled = true;
            joinBtn.textContent = 'CONNECTING...';
            
            try {
                showToast('CONNECTING TO ROOM...');
                
                // Start camera first
                await startCamera();
                
                // Generate player info
                gameState.playerId = 'player_' + Date.now();
                gameState.playerName = generatePlayerName();
                
                // Initialize players (包括自己)
                initRoomPlayers();
                
                // Show game interface
                document.getElementById('cameraInit').style.display = 'none';
                document.getElementById('stepIndicator').style.display = 'flex';
                document.getElementById('gameMain').style.display = 'flex';
                document.getElementById('gameControls').style.display = 'flex';
                document.getElementById('playersSection').style.display = 'block';
                
                // Start waiting for players
                startWaiting();
                
                showToast(`✅ JOINED ROOM ${gameState.roomId}`);
                
            } catch (error) {
                console.error('Join room error:', error);
                showToast('❌ CONNECTION FAILED', 'error');
            } finally {
                joinBtn.disabled = false;
                joinBtn.textContent = '▶ JOIN MULTIPLAYER ROOM';
            }
        }

        // Initialize room players (模擬其他玩家加入)
        function initRoomPlayers() {
            // 自己
            const currentPlayer = {
                id: gameState.playerId,
                name: gameState.playerName,
                avatar: getRandomAvatar(),
                status: 'ready',
                score: 0,
                isCurrent: true,
                hasChallenge: false
            };
            
            // 模擬其他3個玩家（在真實環境中，這些會是其他連線的用戶）
            const mockPlayers = [
                { id: 'player2', name: 'NEO42', avatar: '👾', status: 'waiting', score: 0, hasChallenge: false },
                { id: 'player3', name: 'GHOST77', avatar: '👻', status: 'waiting', score: 0, hasChallenge: false },
                { id: 'player4', name: 'VIPER23', avatar: '🐍', status: 'waiting', score: 0, hasChallenge: false }
            ];
            
            gameState.players = [currentPlayer, ...mockPlayers];
            updatePlayersList();
        }

        function getRandomAvatar() {
            const avatars = ['👤', '👾', '🤖', '👻', '🐉', '🦊', '🐺', '🦅'];
            return avatars[Math.floor(Math.random() * avatars.length)];
        }

        // Start waiting for players
        function startWaiting() {
            gameState.phase = 'waiting';
            updateSteps(1);
            updatePhase('WAITING FOR PLAYERS');
            
            showToast('⏳ WAITING FOR CHALLENGES...');
            
            // 模擬其他玩家陸續出題
            simulatePlayersSubmitting();
        }

        // 模擬其他玩家出題（在真實環境中，這會來自WebSocket）
        function simulatePlayersSubmitting() {
            let playerIndex = 1;
            
            const interval = setInterval(() => {
                if (playerIndex >= gameState.players.length) {
                    clearInterval(interval);
                    
                    // 所有玩家都出題了，開始配對
                    setTimeout(() => {
                        startMatching();
                    }, 1000);
                    
                    return;
                }
                
                const player = gameState.players[playerIndex];
                player.status = 'ready';
                player.hasChallenge = true;
                
                // 模擬玩家照片（使用隨機圖片）
                const challengePhoto = 'https://picsum.photos/400/300?random=' + Date.now() + playerIndex;
                
                // 加入挑戰佇列
                gameState.challenges.push({
                    playerId: player.id,
                    playerName: player.name,
                    playerAvatar: player.avatar,
                    photoUrl: challengePhoto,
                    timestamp: Date.now()
                });
                
                updatePlayersList();
                showToast(`📸 ${player.name} SUBMITTED CHALLENGE`);
                
                playerIndex++;
            }, 2000);
        }

        // Start matching
        function startMatching() {
            if (gameState.challenges.length === 0) {
                showToast('NO CHALLENGES AVAILABLE', 'error');
                return;
            }
            
            // 隨機排序挑戰
            gameState.challengeQueue = shuffleArray([...gameState.challenges]);
            gameState.currentChallengeIndex = 0;
            
            updateQueueDisplay();
            
            // 開始第一個挑戰
            receiveChallenge();
        }

        // Receive challenge
        function receiveChallenge() {
            if (gameState.currentChallengeIndex >= gameState.challengeQueue.length) {
                // 所有挑戰都完成了
                showToast('🏆 ALL CHALLENGES COMPLETED');
                return;
            }
            
            const challenge = gameState.challengeQueue[gameState.currentChallengeIndex];
            gameState.currentChallenge = challenge;
            gameState.currentPhoto = null;
            gameState.lastResult = null;
            
            document.getElementById('targetImg').src = challenge.photoUrl;
            document.getElementById('targetImg').style.display = 'block';
            document.getElementById('targetPlaceholder').style.display = 'none';
            document.getElementById('questionOwner').textContent = `👤 ${challenge.playerName} ${challenge.playerAvatar}`;
            
            // 更新佇列顯示
            updateQueueDisplay();
            
            gameState.phase = 'challenge';
            updateSteps(2);
            updatePhase('CHALLENGE READY');
            
            showToast(`📸 CHALLENGE FROM ${challenge.playerName}`);
            
            // Start capture phase
            setTimeout(() => {
                startCapturePhase();
            }, 2000);
        }

        // Start capture phase
        function startCapturePhase() {
            gameState.phase = 'capture';
            updateSteps(3);
            updatePhase('CAPTURE MATCH');
            
            startTimer(GAME_CONFIG.challengeTime);
            
            document.getElementById('takePhotoBtn').disabled = false;
            document.getElementById('submitPhotoBtn').style.display = 'inline-block';
            
            showToast('🎯 MATCH THE ANGLE');
        }

        // Camera Functions
        async function startCamera() {
            try {
                const constraints = {
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'environment'
                    }
                };

                gameState.camera = await navigator.mediaDevices.getUserMedia(constraints);
                
                const video = document.getElementById('video');
                video.srcObject = gameState.camera;
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
                
                video.classList.add('visible');
                document.getElementById('cameraPlaceholder').style.display = 'none';
                
                document.getElementById('canvas').width = video.videoWidth;
                document.getElementById('canvas').height = video.videoHeight;
                
                gameState.cameraActive = true;
                const cameraStatus = document.getElementById('cameraStatus');
                cameraStatus.textContent = 'ONLINE';
                cameraStatus.className = 'online';
                document.getElementById('takePhotoBtn').disabled = false;
                
                return true;
                
            } catch (error) {
                console.error('Camera error:', error);
                throw error;
            }
        }

        // Photo Functions
        function takePhoto() {
            if (!gameState.cameraActive) {
                showToast('CAMERA OFFLINE', 'error');
                return;
            }

            if (gameState.phase !== 'capture') {
                showToast('WAIT FOR CHALLENGE', 'error');
                return;
            }

            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const photoData = canvas.toDataURL('image/jpeg', 0.95);
            gameState.currentPhoto = photoData;
            
            document.getElementById('photoPreview').src = photoData;
            document.getElementById('photoPreviewContainer').style.display = 'block';
            
            calculateAndShowSimilarity();
            
            document.querySelector('.camera-area').classList.add('shake');
            setTimeout(() => {
                document.querySelector('.camera-area').classList.remove('shake');
            }, 300);
        }

        // Image Comparison
        async function calculateImageSimilarity(img1Url, img2Data) {
            return new Promise((resolve) => {
                const img1 = new Image();
                const img2 = new Image();
                let loadedCount = 0;
                
                img1.crossOrigin = 'anonymous';
                
                img1.onload = () => {
                    loadedCount++;
                    if (loadedCount === 2) {
                        const similarity = compareImages(img1, img2);
                        resolve(similarity);
                    }
                };
                
                img2.onload = () => {
                    loadedCount++;
                    if (loadedCount === 2) {
                        const similarity = compareImages(img1, img2);
                        resolve(similarity);
                    }
                };
                
                img1.src = img1Url;
                img2.src = img2Data;
            });
        }

        function compareImages(img1, img2) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const size = 64;
            canvas.width = size;
            canvas.height = size;
            
            ctx.drawImage(img1, 0, 0, size, size);
            const features1 = extractFeatures(ctx, size);
            
            ctx.clearRect(0, 0, size, size);
            ctx.drawImage(img2, 0, 0, size, size);
            const features2 = extractFeatures(ctx, size);
            
            let totalDiff = 0;
            for (let i = 0; i < features1.length; i++) {
                totalDiff += Math.abs(features1[i] - features2[i]);
            }
            
            const avgDiff = totalDiff / features1.length;
            let similarity = 100 - (avgDiff * 100 / 255);
            
            return Math.round(Math.max(0, Math.min(100, similarity)));
        }

        function extractFeatures(ctx, size) {
            const imageData = ctx.getImageData(0, 0, size, size);
            const data = imageData.data;
            const features = [];
            
            for (let i = 0; i < data.length; i += 16) {
                const gray = Math.round(
                    data[i] * 0.299 + 
                    data[i + 1] * 0.587 + 
                    data[i + 2] * 0.114
                );
                features.push(gray);
            }
            
            return features;
        }

        async function calculateAndShowSimilarity() {
            if (!gameState.currentChallenge || !gameState.currentPhoto) return;
            
            const similarity = await calculateImageSimilarity(
                gameState.currentChallenge.photoUrl, 
                gameState.currentPhoto
            );
            
            document.getElementById('similarityMeter').style.display = 'block';
            const fill = document.getElementById('similarityFill');
            const text = document.getElementById('similarityText');
            
            fill.style.width = similarity + '%';
            text.textContent = similarity + '%';
            
            if (similarity >= GAME_CONFIG.perfectThreshold) {
                fill.className = 'meter-fill perfect';
            } else if (similarity >= GAME_CONFIG.goodThreshold) {
                fill.className = 'meter-fill good';
            } else if (similarity >= GAME_CONFIG.similarityThreshold) {
                fill.className = 'meter-fill good';
                fill.style.background = '#ff9900';
            } else {
                fill.className = 'meter-fill poor';
            }
            
            gameState.lastResult = {
                similarity: similarity,
                isPass: similarity >= GAME_CONFIG.similarityThreshold
            };
            
            if (similarity >= GAME_CONFIG.similarityThreshold) {
                document.getElementById('submitPhotoBtn').disabled = false;
                showToast(`✅ MATCH ${similarity}%`, 'success');
            } else {
                document.getElementById('submitPhotoBtn').disabled = true;
                showToast(`📸 NEED ${GAME_CONFIG.similarityThreshold}%`, 'warning');
            }
        }

        function submitPhoto() {
            if (!gameState.lastResult || !gameState.lastResult.isPass) {
                showToast('❌ MATCH FAILED', 'error');
                return;
            }

            const similarity = gameState.lastResult.similarity;
            const timeBonus = Math.floor(gameState.timer * 5);
            let similarityBonus = similarity >= GAME_CONFIG.perfectThreshold ? 300 :
                                similarity >= GAME_CONFIG.goodThreshold ? 200 : 100;
            
            const roundScore = 100 + timeBonus + similarityBonus;
            gameState.score += roundScore;
            
            // Update player score
            const currentPlayer = gameState.players.find(p => p.isCurrent);
            if (currentPlayer) {
                currentPlayer.score = gameState.score;
            }
            
            gameState.phase = 'scoring';
            updateSteps(5);
            updatePhase('SCORE');
            
            let resultMessage = similarity >= GAME_CONFIG.perfectThreshold ? '✨ PERFECT ✨' :
                               similarity >= GAME_CONFIG.goodThreshold ? '🌟 GOOD' : '✓ SUCCESS';
            
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('resultMessage').innerHTML = resultMessage;
            document.getElementById('scoreDisplay').textContent = `+${roundScore}`;
            
            document.getElementById('submitPhotoBtn').style.display = 'none';
            document.getElementById('takePhotoBtn').disabled = true;
            document.getElementById('nextChallengeBtn').style.display = 'inline-block';
            
            stopTimer();
            updatePlayersList();
            
            showToast(`🎉 +${roundScore} POINTS`);
        }

        // Next Challenge
        function nextChallenge() {
            gameState.currentChallengeIndex++;
            
            if (gameState.currentChallengeIndex >= gameState.challengeQueue.length) {
                // 所有挑戰完成
                showToast('🏆 ALL CHALLENGES COMPLETED');
                document.getElementById('nextChallengeBtn').style.display = 'none';
                document.getElementById('resultBox').style.display = 'none';
                document.getElementById('targetImg').style.display = 'none';
                document.getElementById('targetPlaceholder').style.display = 'flex';
                document.getElementById('targetPlaceholder').innerHTML = '<i>🏆</i><p>ALL CHALLENGES COMPLETED</p>';
                return;
            }
            
            // Reset for next challenge
            gameState.currentPhoto = null;
            gameState.lastResult = null;
            
            document.getElementById('photoPreviewContainer').style.display = 'none';
            document.getElementById('similarityMeter').style.display = 'none';
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('nextChallengeBtn').style.display = 'none';
            document.getElementById('submitPhotoBtn').style.display = 'none';
            
            // Receive next challenge
            receiveChallenge();
        }

        // Timer Functions
        function startTimer(seconds) {
            gameState.timer = seconds;
            updateTimerDisplay();
            
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
            }
            
            gameState.timerInterval = setInterval(() => {
                gameState.timer--;
                updateTimerDisplay();
                
                if (gameState.timer <= 0) {
                    handleTimeout();
                }
            }, 1000);
        }

        function stopTimer() {
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
            }
            document.getElementById('timer').textContent = '--';
        }

        function updateTimerDisplay() {
            const timerElement = document.getElementById('timer');
            timerElement.textContent = gameState.timer + 's';
            
            if (gameState.timer <= 10) {
                timerElement.classList.add('warning');
            } else {
                timerElement.classList.remove('warning');
            }
        }

        function handleTimeout() {
            stopTimer();
            showToast('⏰ TIME OUT', 'warning');
            nextChallenge();
        }

        // UI Update Functions
        function updateSteps(activeStep) {
            for (let i = 1; i <= 5; i++) {
                const step = document.getElementById(`step${i}`);
                if (step) {
                    step.classList.remove('active', 'completed');
                    if (i < activeStep) {
                        step.classList.add('completed');
                    } else if (i === activeStep) {
                        step.classList.add('active');
                    }
                }
            }
        }

        function updatePhase(text) {
            document.getElementById('phaseIndicator').textContent = text;
        }

        function updatePlayersList() {
            const playersList = document.getElementById('playersList');
            if (playersList) {
                playersList.innerHTML = gameState.players.map(player => `
                    <div class="player-card ${player.isCurrent ? 'current' : ''} ${player.status === 'waiting' ? 'waiting' : ''}">
                        <div class="player-avatar">${player.avatar}</div>
                        <div class="player-name">${player.name} ${player.isCurrent ? '(YOU)' : ''}</div>
                        <div class="player-status ${player.status}">${player.hasChallenge ? '📸 READY' : '⏳ WAITING'}</div>
                        <div class="player-score">${player.score}</div>
                    </div>
                `).join('');
            }
        }

        function updateQueueDisplay() {
            const queueContainer = document.getElementById('queueItems');
            if (!queueContainer) return;
            
            queueContainer.innerHTML = gameState.challengeQueue.map((challenge, index) => `
                <div class="queue-item ${index === gameState.currentChallengeIndex ? 'active' : ''}">
                    ${challenge.playerAvatar}
                </div>
            `).join('');
            
            document.getElementById('challengeQueue').style.display = 'block';
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            if (!toast) return;
            
            toast.textContent = message;
            toast.className = 'toast show';
            
            if (type === 'error') {
                toast.style.background = 'rgba(255, 51, 51, 0.9)';
            } else if (type === 'warning') {
                toast.style.background = 'rgba(255, 153, 0, 0.9)';
            } else {
                toast.style.background = 'rgba(0, 255, 0, 0.9)';
            }
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        // Cleanup
        window.addEventListener('beforeunload', function() {
            if (gameState.camera) {
                gameState.camera.getTracks().forEach(track => track.stop());
            }
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
            }
        });
    </script>
</body>
</html>
