<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HALF HOUR TERMINUS - PHOTO MISSION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            position: relative;
        }

        /* 背景效果 */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, 
                rgba(0,0,0,0.95) 0%, 
                rgba(20,20,20,0.9) 100%);
            z-index: -2;
        }

        .cyber-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 20px,
                rgba(255, 51, 51, 0.03) 20px,
                rgba(255, 51, 51, 0.03) 40px
            );
            z-index: -1;
        }

        .cyber-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, 
                rgba(255, 51, 51, 0.1) 0%, 
                transparent 70%);
            z-index: -1;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 10;
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc0IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4wMiIgLz48L3N2Zz4=');
            opacity: 0.1;
            pointer-events: none;
            z-index: 9;
        }

        /* 主要容器 */
        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* 頂部狀態欄 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ff3333;
            margin-bottom: 30px;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.3);
        }

        .status-bar::before {
            content: 'SYSTEM ACTIVE';
            position: absolute;
            top: -10px;
            left: 20px;
            background: #000;
            padding: 0 10px;
            color: #ff3333;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .level-info {
            display: flex;
            gap: 30px;
        }

        .level-badge {
            color: #ff3333;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .phase-badge {
            color: #fff;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .timer {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ff3333;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.8);
            letter-spacing: 5px;
        }

        .timer.warning {
            animation: pulse 0.5s infinite;
        }

        /* 步驟指示器 */
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #ff3333;
        }

        .step {
            flex: 1;
            text-align: center;
            padding: 10px;
            color: #666;
            position: relative;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .step.active {
            color: #ff3333;
            font-weight: 700;
        }

        .step.completed {
            color: #00ff00;
        }

        .step:not(:last-child)::after {
            content: '→';
            position: absolute;
            right: -10px;
            color: #ff3333;
        }

        /* 遊戲主區域 */
        .game-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        /* 題目區域 */
        .question-area, .camera-area {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ff3333;
            padding: 20px;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.2);
        }

        .question-area::before, .camera-area::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 20px;
            height: 20px;
            border-top: 3px solid #ff3333;
            border-left: 3px solid #ff3333;
        }

        .question-area::after, .camera-area::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 20px;
            height: 20px;
            border-bottom: 3px solid #ff3333;
            border-right: 3px solid #ff3333;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 1.3rem;
            color: #ff3333;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .image-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #111;
            border: 1px solid #ff3333;
            overflow: hidden;
            margin-bottom: 15px;
            position: relative;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #video.visible {
            display: block;
        }

        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
            background: #0a0a0a;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .placeholder i {
            font-size: 4rem;
            margin-bottom: 10px;
            color: #ff3333;
            opacity: 0.5;
        }

        /* 相似度計 */
        .similarity-meter {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid #ff3333;
        }

        .meter-label {
            color: #ff3333;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .meter-bar {
            width: 100%;
            height: 20px;
            background: #111;
            border: 1px solid #ff3333;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            transition: width 0.3s ease;
        }

        .meter-fill.perfect {
            background: #00ff00;
        }

        .meter-fill.good {
            background: #ff9900;
        }

        .meter-fill.poor {
            background: #ff3333;
        }

        /* 控制按鈕 */
        .game-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: 2px solid #ff3333;
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 51, 51, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover {
            background: #ff3333;
            color: black;
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 51, 51, 0.5);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #666;
        }

        .btn:disabled:hover {
            background: transparent;
            color: white;
            transform: none;
            box-shadow: none;
        }

        /* 玩家列表 */
        .players-section {
            margin-top: 40px;
            padding: 20px;
            border: 1px solid #ff3333;
            background: rgba(0, 0, 0, 0.9);
        }

        .players-section h3 {
            color: #ff3333;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .player-card {
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid #ff3333;
            padding: 15px;
            text-align: center;
        }

        .player-avatar {
            width: 60px;
            height: 60px;
            background: #ff3333;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: black;
        }

        .player-name {
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .player-score {
            color: #ff3333;
            font-weight: 700;
        }

        /* 成績榜 */
        .leaderboard {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ff3333;
            padding: 15px;
            min-width: 250px;
            z-index: 100;
        }

        .leaderboard h3 {
            color: #ff3333;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 51, 51, 0.3);
        }

        /* 結果顯示 */
        .result-box {
            text-align: center;
            padding: 20px;
            border: 2px solid #ff3333;
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.9);
        }

        .result-message {
            color: #ff3333;
            font-size: 1.5rem;
            letter-spacing: 3px;
        }

        .score {
            font-size: 4rem;
            color: #ff3333;
            margin: 10px 0;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(255, 51, 51, 0.8);
        }

        /* 提示訊息 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ff3333;
            color: white;
            padding: 20px 40px;
            font-size: 1.5rem;
            letter-spacing: 3px;
            z-index: 1000;
            display: none;
            box-shadow: 0 0 50px rgba(255, 51, 51, 0.5);
        }

        .toast.show {
            display: block;
            animation: glitchIn 0.3s ease;
        }

        /* 動畫 */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes glitchIn {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.3s ease;
        }

        /* 相機啟動按鈕 */
        .camera-init {
            text-align: center;
            padding: 60px;
            border: 2px solid #ff3333;
            background: rgba(0, 0, 0, 0.9);
            margin-bottom: 30px;
        }

        .camera-init button {
            padding: 20px 60px;
            font-size: 2rem;
            border: 3px solid #ff3333;
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .camera-init button:hover {
            background: #ff3333;
            color: black;
            transform: scale(1.1);
            box-shadow: 0 0 60px rgba(255, 51, 51, 0.8);
        }

        /* 返回按鈕 */
        .back-button {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
        }

        .back-button a {
            color: #ff3333;
            text-decoration: none;
            border: 1px solid #ff3333;
            padding: 10px 20px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .back-button a:hover {
            background: #ff3333;
            color: black;
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            .game-main {
                grid-template-columns: 1fr;
            }
            
            .leaderboard {
                position: static;
                margin-bottom: 20px;
            }
            
            .status-bar {
                flex-direction: column;
                gap: 10px;
            }
            
            .timer {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- 背景效果 -->
    <div class="cyber-bg"></div>
    <div class="scan-line"></div>
    <div class="noise"></div>

    <!-- 返回按鈕 -->
    <div class="back-button">
        <a href="index.html">← TERMINUS</a>
    </div>

    <!-- 成績榜 -->
    <div class="leaderboard">
        <h3>▶ TERMINAL RANK</h3>
        <div id="leaderboardList"></div>
    </div>

    <div class="game-container">
        <!-- 頂部狀態欄 -->
        <div class="status-bar">
            <div class="level-info">
                <div class="level-badge" id="currentLevel">LEVEL 01</div>
                <div class="phase-badge" id="phaseIndicator">PHASE: CAPTURE</div>
            </div>
            <div class="timer" id="timer">60s</div>
        </div>

        <!-- 相機啟動按鈕 -->
        <div class="camera-init" id="cameraInit">
            <button onclick="startCamera()">
                ▶ INITIALIZE CAMERA
            </button>
            <p style="margin-top: 20px; color: #ff3333; letter-spacing: 2px;">// ACCESS REQUIRED //</p>
        </div>

        <!-- 步驟指示器 -->
        <div class="step-indicator" id="stepIndicator" style="display: none;">
            <div class="step" id="step1">CAPTURE</div>
            <div class="step" id="step2">CONFIRM</div>
            <div class="step" id="step3">WAIT</div>
            <div class="step" id="step4">MATCH</div>
            <div class="step" id="step5">SCORE</div>
        </div>

        <!-- 遊戲主區域 -->
        <div class="game-main" id="gameMain" style="display: none;">
            <!-- 左側：題目區域 -->
            <div class="question-area">
                <div class="section-title">
                    <span>> TARGET IMAGE</span>
                    <span id="questionOwner"></span>
                </div>
                <div class="image-container" id="targetImage">
                    <img id="targetImg" src="" alt="TARGET" style="display: none;">
                    <div class="placeholder" id="targetPlaceholder">
                        <i>⌛</i>
                        <p>AWAITING TARGET</p>
                    </div>
                </div>
                
                <!-- 出題者拍照預覽 -->
                <div class="image-container" id="questionPreviewContainer" style="display: none; margin-top: 10px;">
                    <div class="section-title">> YOUR CAPTURE</div>
                    <img id="questionPreview" src="" alt="YOUR CAPTURE" style="width: 100%; height: 100%; object-fit: cover;">
                </div>

                <!-- 相似度顯示 -->
                <div class="similarity-meter" id="similarityMeter" style="display: none;">
                    <div class="meter-label">MATCH RATE</div>
                    <div class="meter-bar">
                        <div class="meter-fill" id="similarityFill" style="width: 0%"></div>
                    </div>
                    <div style="text-align: center; margin-top: 10px; color: #ff3333;" id="similarityText">0%</div>
                </div>

                <!-- 得分結果 -->
                <div class="result-box" id="resultBox" style="display: none;">
                    <div class="result-message" id="resultMessage"></div>
                    <div class="score" id="scoreDisplay">0</div>
                </div>
            </div>

            <!-- 右側：相機區域 -->
            <div class="camera-area">
                <div class="section-title">
                    <span>> CAMERA FEED</span>
                    <span id="cameraStatus">OFFLINE</span>
                </div>
                <div class="image-container">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas" style="display: none;"></canvas>
                    <div class="placeholder" id="cameraPlaceholder">
                        <i>📷</i>
                        <p>CAMERA OFFLINE</p>
                    </div>
                </div>

                <!-- 拍照預覽 -->
                <div class="image-container" id="photoPreviewContainer" style="display: none; margin-top: 10px;">
                    <div class="section-title">> PREVIEW</div>
                    <img id="photoPreview" src="" alt="PREVIEW" style="width: 100%; height: 100%; object-fit: cover;">
                </div>

                <!-- 拍照按鈕 -->
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="btn" id="takePhotoBtn" onclick="takePhoto()" disabled style="flex: 1;">
                        📸 CAPTURE
                    </button>
                </div>
            </div>
        </div>

        <!-- 遊戲控制按鈕 -->
        <div class="game-controls" id="gameControls" style="display: none;">
            <button class="btn" id="startGameBtn" onclick="startGame()">
                ▶ INITIATE MISSION
            </button>
            <button class="btn" id="confirmQuestionBtn" onclick="confirmQuestion()" style="display: none;">
                ✓ CONFIRM TARGET
            </button>
            <button class="btn" id="submitAnswerBtn" onclick="submitAnswer()" style="display: none;">
                ⬆ SUBMIT MATCH
            </button>
            <button class="btn" id="nextRoundBtn" onclick="nextRound()" style="display: none;">
                ⏭ NEXT LEVEL
            </button>
        </div>

        <!-- 玩家列表 -->
        <div class="players-section" id="playersSection" style="display: none;">
            <h3>> ACTIVE OPERATORS</h3>
            <div class="players-grid" id="playersList"></div>
        </div>
    </div>

    <!-- 提示訊息 -->
    <div id="toast" class="toast"></div>

    <script>
        // ==================== 遊戲設定 ====================
        const GAME_CONFIG = {
            baseQuestionTime: 30,
            baseAnswerTime: 60,
            timeReducePerLevel: 5,
            minTime: 10,
            similarityThreshold: 60,
            goodThreshold: 70,
            perfectThreshold: 80
        };

        // ==================== 遊戲狀態 ====================
        let gameState = {
            level: 1,
            phase: 'idle',
            timer: 0,
            timerInterval: null,
            questionPhoto: null,
            currentPhoto: null,
            players: [],
            currentPlayerId: 'player1',
            score: 0,
            camera: null,
            cameraActive: false,
            lastResult: null
        };

        // 模擬玩家資料
        const mockPlayers = [
            { id: 'player1', name: 'YOU', avatar: '👤', score: 0, isCurrent: true },
            { id: 'player2', name: 'HUNTER-A', avatar: '⚡', score: 0 },
            { id: 'player3', name: 'HUNTER-B', avatar: '🔥', score: 0 }
        ];

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            initGame();
        });

        function initGame() {
            gameState.players = [...mockPlayers];
            updateLeaderboard();
            updatePlayersList();
        }

        // ==================== 相機功能 ====================
        async function startCamera() {
            try {
                showToast('REQUESTING CAMERA ACCESS...');
                
                const constraints = {
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'environment'
                    }
                };

                gameState.camera = await navigator.mediaDevices.getUserMedia(constraints);
                
                const video = document.getElementById('video');
                video.srcObject = gameState.camera;
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
                
                video.classList.add('visible');
                document.getElementById('cameraPlaceholder').style.display = 'none';
                
                document.getElementById('canvas').width = video.videoWidth;
                document.getElementById('canvas').height = video.videoHeight;
                
                gameState.cameraActive = true;
                document.getElementById('cameraStatus').textContent = 'ONLINE';
                document.getElementById('cameraStatus').style.color = '#00ff00';
                document.getElementById('takePhotoBtn').disabled = false;
                
                // 顯示遊戲介面
                document.getElementById('cameraInit').style.display = 'none';
                document.getElementById('stepIndicator').style.display = 'flex';
                document.getElementById('gameMain').style.display = 'grid';
                document.getElementById('gameControls').style.display = 'flex';
                document.getElementById('playersSection').style.display = 'block';
                
                showToast('✅ CAMERA ONLINE');
                
            } catch (error) {
                console.error('相機啟動失敗:', error);
                let errorMessage = 'CAMERA ERROR';
                if (error.name === 'NotAllowedError') {
                    errorMessage = 'ACCESS DENIED';
                } else if (error.name === 'NotFoundError') {
                    errorMessage = 'NO CAMERA FOUND';
                } else if (error.name === 'NotReadableError') {
                    errorMessage = 'CAMERA IN USE';
                }
                showToast('❌ ' + errorMessage, 'error');
                document.getElementById('cameraStatus').textContent = 'ERROR';
            }
        }

        // ==================== 圖片比對功能 ====================
        
        async function calculateImageSimilarity(img1Data, img2Data) {
            return new Promise((resolve) => {
                const img1 = new Image();
                const img2 = new Image();
                let loadedCount = 0;
                
                img1.onload = () => {
                    loadedCount++;
                    if (loadedCount === 2) {
                        const similarity = compareImagesFriendly(img1, img2);
                        resolve(similarity);
                    }
                };
                
                img2.onload = () => {
                    loadedCount++;
                    if (loadedCount === 2) {
                        const similarity = compareImagesFriendly(img1, img2);
                        resolve(similarity);
                    }
                };
                
                img1.src = img1Data;
                img2.src = img2Data;
            });
        }

        function compareImagesFriendly(img1, img2) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const size = 64;
            canvas.width = size;
            canvas.height = size;
            
            ctx.drawImage(img1, 0, 0, size, size);
            const features1 = extractFriendlyFeatures(ctx, size);
            
            ctx.clearRect(0, 0, size, size);
            ctx.drawImage(img2, 0, 0, size, size);
            const features2 = extractFriendlyFeatures(ctx, size);
            
            let totalDifference = 0;
            let maxDifference = 0;
            
            for (let i = 0; i < features1.length; i++) {
                const diff = Math.abs(features1[i] - features2[i]);
                totalDifference += diff;
                maxDifference = Math.max(maxDifference, diff);
            }
            
            const avgDifference = totalDifference / features1.length;
            let similarity = 100 - (avgDifference * 100 / 255);
            const maxDiffPenalty = Math.min(maxDifference / 255 * 30, 30);
            similarity = similarity - maxDiffPenalty;
            
            similarity = Math.max(0, Math.min(100, similarity));
            
            return Math.round(similarity);
        }

        function extractFriendlyFeatures(ctx, size) {
            const imageData = ctx.getImageData(0, 0, size, size);
            const data = imageData.data;
            
            const features = [];
            
            for (let i = 0; i < data.length; i += 16) {
                const gray = Math.round(
                    data[i] * 0.299 + 
                    data[i + 1] * 0.587 + 
                    data[i + 2] * 0.114
                );
                features.push(gray);
            }
            
            for (let y = 0; y < size; y += 8) {
                for (let x = 0; x < size; x += 8) {
                    let sum = 0;
                    let count = 0;
                    
                    for (let dy = 0; dy < 8 && y + dy < size; dy++) {
                        for (let dx = 0; dx < 8 && x + dx < size; dx++) {
                            const idx = ((y + dy) * size + (x + dx)) * 4;
                            sum += data[idx] * 0.299 + data[idx + 1] * 0.587 + data[idx + 2] * 0.114;
                            count++;
                        }
                    }
                    
                    features.push(Math.round(sum / count));
                }
            }
            
            return features;
        }

        // ==================== 拍照功能 ====================
        function takePhoto() {
            if (!gameState.cameraActive) {
                showToast('CAMERA OFFLINE', 'error');
                return;
            }

            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const photoData = canvas.toDataURL('image/jpeg', 0.95);
            gameState.currentPhoto = photoData;
            
            document.getElementById('photoPreview').src = photoData;
            document.getElementById('photoPreviewContainer').style.display = 'block';
            
            if (gameState.phase === 'idle' || gameState.phase === 'takingQuestion') {
                gameState.phase = 'takingQuestion';
                document.getElementById('confirmQuestionBtn').style.display = 'inline-block';
                document.getElementById('submitAnswerBtn').style.display = 'none';
                showToast('📸 CAPTURE COMPLETE');
            } else if (gameState.phase === 'answering') {
                calculateAndShowSimilarity();
            }
            
            document.querySelector('.camera-area').classList.add('shake');
            setTimeout(() => {
                document.querySelector('.camera-area').classList.remove('shake');
            }, 300);
        }

        // ==================== 出題流程 ====================
        function startGame() {
            gameState.phase = 'takingQuestion';
            gameState.level = 1;
            gameState.questionPhoto = null;
            gameState.currentPhoto = null;
            gameState.score = 0;
            
            gameState.players = gameState.players.map(p => {
                if (p.isCurrent) {
                    return { ...p, score: 0 };
                }
                return p;
            });
            
            updateSteps(1);
            updatePhase('CAPTURE TARGET');
            startTimer(GAME_CONFIG.baseQuestionTime);
            
            document.getElementById('startGameBtn').style.display = 'none';
            document.getElementById('confirmQuestionBtn').style.display = 'none';
            document.getElementById('submitAnswerBtn').style.display = 'none';
            document.getElementById('nextRoundBtn').style.display = 'none';
            document.getElementById('takePhotoBtn').disabled = false;
            
            document.getElementById('targetImg').style.display = 'none';
            document.getElementById('targetPlaceholder').style.display = 'flex';
            document.getElementById('questionPreviewContainer').style.display = 'none';
            document.getElementById('photoPreviewContainer').style.display = 'none';
            document.getElementById('similarityMeter').style.display = 'none';
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('questionOwner').textContent = '';
            
            updateLeaderboard();
            updatePlayersList();
            
            showToast('🎮 MISSION STARTED');
        }

        function confirmQuestion() {
            if (!gameState.currentPhoto) {
                showToast('NO CAPTURE', 'error');
                return;
            }

            gameState.questionPhoto = gameState.currentPhoto;
            
            document.getElementById('targetImg').src = gameState.questionPhoto;
            document.getElementById('targetImg').style.display = 'block';
            document.getElementById('targetPlaceholder').style.display = 'none';
            
            document.getElementById('questionPreview').src = gameState.questionPhoto;
            document.getElementById('questionPreviewContainer').style.display = 'block';
            
            gameState.phase = 'waiting';
            updateSteps(3);
            updatePhase('WAITING FOR HUNTER');
            
            stopTimer();
            
            document.getElementById('confirmQuestionBtn').style.display = 'none';
            document.getElementById('takePhotoBtn').disabled = true;
            
            showToast('✅ TARGET SET');
            
            setTimeout(() => {
                startAnsweringPhase();
            }, 3000);
        }

        function startAnsweringPhase() {
            gameState.phase = 'answering';
            updateSteps(4);
            updatePhase('HUNTER ACTIVE');
            
            const otherPlayers = gameState.players.filter(p => !p.isCurrent);
            if (otherPlayers.length > 0) {
                const randomPlayer = otherPlayers[Math.floor(Math.random() * otherPlayers.length)];
                document.getElementById('questionOwner').textContent = `> HUNTER: ${randomPlayer.name}`;
            }
            
            const answerTime = Math.max(
                GAME_CONFIG.baseAnswerTime - (gameState.level - 1) * GAME_CONFIG.timeReducePerLevel,
                GAME_CONFIG.minTime
            );
            startTimer(answerTime);
            
            document.getElementById('takePhotoBtn').disabled = false;
            document.getElementById('submitAnswerBtn').style.display = 'inline-block';
            
            showToast('🎯 MATCH THE TARGET');
        }

        // ==================== 答題功能 ====================
        async function calculateAndShowSimilarity() {
            if (!gameState.questionPhoto || !gameState.currentPhoto) return;
            
            const similarity = await calculateImageSimilarity(gameState.questionPhoto, gameState.currentPhoto);
            
            document.getElementById('similarityMeter').style.display = 'block';
            const fill = document.getElementById('similarityFill');
            const text = document.getElementById('similarityText');
            
            fill.style.width = similarity + '%';
            text.textContent = similarity + '%';
            
            if (similarity >= GAME_CONFIG.perfectThreshold) {
                fill.className = 'meter-fill perfect';
            } else if (similarity >= GAME_CONFIG.goodThreshold) {
                fill.className = 'meter-fill good';
            } else if (similarity >= GAME_CONFIG.similarityThreshold) {
                fill.className = 'meter-fill good';
                fill.style.background = 'linear-gradient(90deg, #feca57, #ff9f43)';
            } else {
                fill.className = 'meter-fill poor';
            }
            
            gameState.lastResult = {
                similarity: similarity,
                isPass: similarity >= GAME_CONFIG.similarityThreshold,
                quality: similarity >= GAME_CONFIG.perfectThreshold ? 'perfect' :
                        similarity >= GAME_CONFIG.goodThreshold ? 'good' : 'pass'
            };
            
            if (similarity >= GAME_CONFIG.similarityThreshold) {
                showToast(`✅ MATCH ${similarity}%`, 'success');
            } else {
                showToast(`📸 CURRENT ${similarity}% NEED ${GAME_CONFIG.similarityThreshold}%`, 'warning');
            }
        }

        async function submitAnswer() {
            if (!gameState.currentPhoto) {
                showToast('NO CAPTURE', 'error');
                return;
            }

            if (!gameState.lastResult) {
                await calculateAndShowSimilarity();
            }

            if (!gameState.lastResult || !gameState.lastResult.isPass) {
                showToast(`❌ MATCH FAILED (NEED ${GAME_CONFIG.similarityThreshold}%)`, 'error');
                return;
            }

            const similarity = gameState.lastResult.similarity;
            const timeBonus = Math.floor(gameState.timer * 5);
            let similarityBonus = 0;
            
            if (similarity >= GAME_CONFIG.perfectThreshold) {
                similarityBonus = 300;
            } else if (similarity >= GAME_CONFIG.goodThreshold) {
                similarityBonus = 200;
            } else {
                similarityBonus = 100;
            }
            
            const baseScore = 100;
            const roundScore = baseScore + timeBonus + similarityBonus;
            
            gameState.score += roundScore;
            
            const currentPlayer = gameState.players.find(p => p.isCurrent);
            if (currentPlayer) {
                currentPlayer.score = gameState.score;
            }
            
            gameState.phase = 'scoring';
            updateSteps(5);
            updatePhase('SCORING');
            
            let resultMessage = '';
            if (similarity >= GAME_CONFIG.perfectThreshold) {
                resultMessage = '✨ PERFECT MATCH ✨';
            } else if (similarity >= GAME_CONFIG.goodThreshold) {
                resultMessage = '🌟 GOOD MATCH';
            } else {
                resultMessage = '✓ MATCH SUCCESS';
            }
            
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('resultMessage').innerHTML = resultMessage;
            document.getElementById('scoreDisplay').textContent = `+${roundScore}`;
            
            document.getElementById('submitAnswerBtn').style.display = 'none';
            document.getElementById('takePhotoBtn').disabled = true;
            document.getElementById('nextRoundBtn').style.display = 'inline-block';
            
            stopTimer();
            updateLeaderboard();
            updatePlayersList();
            
            showToast(`🎉 SCORE +${roundScore}`);
        }

        // ==================== 下一關 ====================
        function nextRound() {
            gameState.level++;
            gameState.phase = 'takingQuestion';
            gameState.currentPhoto = null;
            gameState.lastResult = null;
            
            updateSteps(1);
            updatePhase('CAPTURE TARGET');
            
            const questionTime = Math.min(
                GAME_CONFIG.baseQuestionTime + (gameState.level - 1) * 10,
                60
            );
            startTimer(questionTime);
            
            document.getElementById('targetImg').style.display = 'none';
            document.getElementById('targetPlaceholder').style.display = 'flex';
            document.getElementById('questionPreviewContainer').style.display = 'none';
            document.getElementById('photoPreviewContainer').style.display = 'none';
            document.getElementById('similarityMeter').style.display = 'none';
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('questionOwner').textContent = '';
            
            document.getElementById('confirmQuestionBtn').style.display = 'none';
            document.getElementById('submitAnswerBtn').style.display = 'none';
            document.getElementById('nextRoundBtn').style.display = 'none';
            document.getElementById('takePhotoBtn').disabled = false;
            
            showToast(`🌟 LEVEL ${gameState.level}`);
        }

        // ==================== 計時器 ====================
        function startTimer(seconds) {
            gameState.timer = seconds;
            updateTimerDisplay();
            
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
            }
            
            gameState.timerInterval = setInterval(() => {
                gameState.timer--;
                updateTimerDisplay();
                
                if (gameState.timer <= 0) {
                    handleTimeout();
                }
            }, 1000);
        }

        function stopTimer() {
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
            }
        }

        function updateTimerDisplay() {
            const timerElement = document.getElementById('timer');
            timerElement.textContent = gameState.timer + 's';
            
            if (gameState.timer <= 10) {
                timerElement.classList.add('warning');
            } else {
                timerElement.classList.remove('warning');
            }
        }

        function handleTimeout() {
            stopTimer();
            
            if (gameState.phase === 'takingQuestion') {
                showToast('⏰ TIME OUT', 'warning');
                if (gameState.currentPhoto) {
                    confirmQuestion();
                } else {
                    nextRound();
                }
            } else if (gameState.phase === 'answering') {
                showToast('⏰ TIME OUT', 'warning');
                nextRound();
            }
        }

        // ==================== UI 更新 ====================
        function updateSteps(activeStep) {
            for (let i = 1; i <= 5; i++) {
                const step = document.getElementById(`step${i}`);
                if (step) {
                    step.classList.remove('active', 'completed');
                    if (i < activeStep) {
                        step.classList.add('completed');
                    } else if (i === activeStep) {
                        step.classList.add('active');
                    }
                }
            }
        }

        function updatePhase(text) {
            const phaseIndicator = document.getElementById('phaseIndicator');
            if (phaseIndicator) {
                phaseIndicator.textContent = 'PHASE: ' + text;
            }
            const currentLevel = document.getElementById('currentLevel');
            if (currentLevel) {
                currentLevel.textContent = `LEVEL ${gameState.level.toString().padStart(2, '0')}`;
            }
        }

        function updatePlayersList() {
            const playersList = document.getElementById('playersList');
            if (playersList) {
                playersList.innerHTML = gameState.players.map(player => `
                    <div class="player-card">
                        <div class="player-avatar">${player.avatar}</div>
                        <div class="player-name">${player.name} ${player.isCurrent ? '(YOU)' : ''}</div>
                        <div class="player-score">${player.score} PTS</div>
                    </div>
                `).join('');
            }
        }

        function updateLeaderboard() {
            const leaderboardList = document.getElementById('leaderboardList');
            if (leaderboardList) {
                const sortedPlayers = [...gameState.players].sort((a, b) => b.score - a.score);
                leaderboardList.innerHTML = sortedPlayers.map((player, index) => `
                    <div class="leaderboard-item">
                        <span>${index + 1}. ${player.avatar} ${player.name}</span>
                        <span>${player.score}</span>
                    </div>
                `).join('');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            if (!toast) return;
            
            toast.textContent = message;
            toast.className = 'toast show';
            
            if (type === 'error') {
                toast.style.background = 'rgba(255, 51, 51, 0.9)';
            } else if (type === 'warning') {
                toast.style.background = 'rgba(255, 153, 0, 0.9)';
            } else {
                toast.style.background = 'rgba(0, 255, 0, 0.9)';
            }
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 清理資源
        window.addEventListener('beforeunload', function() {
            if (gameState.camera) {
                gameState.camera.getTracks().forEach(track => track.stop());
            }
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
            }
        });
    </script>
</body>
</html>
