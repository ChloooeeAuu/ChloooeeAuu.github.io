<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HALF HOUR TERMINUS - MISSION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            font-family: 'Orbitron', sans-serif;
            background: #000;
            color: white;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 背景效果 */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, 
                rgba(0,0,0,0.95) 0%, 
                rgba(20,20,20,0.9) 100%);
            z-index: -2;
        }

        .cyber-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 10px,
                rgba(255, 51, 51, 0.03) 10px,
                rgba(255, 51, 51, 0.03) 20px
            );
            z-index: -1;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 10;
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc0IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4wMiIgLz48L3N2Zz4=');
            opacity: 0.1;
            pointer-events: none;
            z-index: 9;
        }

        /* 主要容器 - 手機全屏 */
        .game-container {
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            position: relative;
            z-index: 1;
        }

        /* 頂部狀態欄 - 手機版 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #ff3333;
            margin: 10px;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.3);
            font-size: clamp(0.7rem, 3vw, 0.9rem);
        }

        .status-bar::before {
            content: 'SYSTEM';
            position: absolute;
            top: -8px;
            left: 10px;
            background: #000;
            padding: 0 8px;
            color: #ff3333;
            font-size: 0.6rem;
            letter-spacing: 1px;
        }

        .level-info {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .level-badge, .phase-badge {
            font-weight: 700;
            letter-spacing: 1px;
        }

        .level-badge {
            color: #ff3333;
        }

        .phase-badge {
            color: #fff;
        }

        .timer {
            font-size: clamp(1.5rem, 6vw, 2rem);
            font-weight: 900;
            color: #ff3333;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.8);
            letter-spacing: 2px;
        }

        /* 步驟指示器 - 手機版 */
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #ff3333;
            flex-wrap: wrap;
        }

        .step {
            flex: 1;
            text-align: center;
            padding: 5px;
            color: #666;
            position: relative;
            font-size: clamp(0.6rem, 2.5vw, 0.8rem);
            letter-spacing: 0.5px;
            min-width: 60px;
        }

        .step.active {
            color: #ff3333;
            font-weight: 700;
        }

        .step.completed {
            color: #00ff00;
        }

        .step:not(:last-child)::after {
            content: '→';
            position: absolute;
            right: -5px;
            color: #ff3333;
            font-size: 0.8rem;
        }

        /* 相機啟動按鈕 - 手機版 */
        .camera-init {
            text-align: center;
            padding: 40px 20px;
            border: 2px solid #ff3333;
            background: rgba(0, 0, 0, 0.9);
            margin: 20px 10px;
        }

        .camera-init button {
            width: 100%;
            max-width: 300px;
            padding: 18px 20px;
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            border: 3px solid #ff3333;
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        .camera-init button:active {
            background: #ff3333;
            color: black;
            transform: scale(0.95);
        }

        /* 遊戲主區域 - 手機版改為垂直排列 */
        .game-main {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 10px;
        }

        /* 題目區域和相機區域 */
        .question-area, .camera-area {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ff3333;
            padding: 15px;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.2);
        }

        .question-area::before, .camera-area::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 15px;
            height: 15px;
            border-top: 2px solid #ff3333;
            border-left: 2px solid #ff3333;
        }

        .question-area::after, .camera-area::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 15px;
            height: 15px;
            border-bottom: 2px solid #ff3333;
            border-right: 2px solid #ff3333;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            color: #ff3333;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 圖片容器 - 固定比例 */
        .image-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #111;
            border: 1px solid #ff3333;
            overflow: hidden;
            margin-bottom: 12px;
            position: relative;
        }

        .image-container img, #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #video {
            display: none;
        }

        #video.visible {
            display: block;
        }

        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
            background: #0a0a0a;
            font-size: clamp(0.8rem, 3vw, 1rem);
            letter-spacing: 1px;
        }

        .placeholder i {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #ff3333;
            opacity: 0.5;
        }

        /* 相似度計 */
        .similarity-meter {
            margin-top: 15px;
            padding: 12px;
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid #ff3333;
        }

        .meter-label {
            color: #ff3333;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
        }

        .meter-bar {
            width: 100%;
            height: 15px;
            background: #111;
            border: 1px solid #ff3333;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            transition: width 0.3s ease;
        }

        .meter-fill.perfect { background: #00ff00; }
        .meter-fill.good { background: #ff9900; }
        .meter-fill.poor { background: #ff3333; }

        /* 控制按鈕 - 手機版垂直排列 */
        .game-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
        }

        .btn {
            width: 100%;
            padding: 15px 20px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            border: 2px solid #ff3333;
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
            border-radius: 0;
        }

        .btn:active {
            background: #ff3333;
            color: black;
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 玩家列表 - 手機版 */
        .players-section {
            margin: 15px 10px;
            padding: 15px;
            border: 1px solid #ff3333;
            background: rgba(0, 0, 0, 0.9);
        }

        .players-section h3 {
            color: #ff3333;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-size: clamp(1rem, 4vw, 1.2rem);
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }

        .player-card {
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid #ff3333;
            padding: 10px;
            text-align: center;
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            background: #ff3333;
            border-radius: 50%;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: black;
        }

        .player-name {
            font-weight: 700;
            margin-bottom: 5px;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
        }

        .player-score {
            color: #ff3333;
            font-weight: 700;
            font-size: clamp(0.7rem, 2.5vw, 0.8rem);
        }

        /* 成績榜 - 手機版改為底部 */
        .leaderboard {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            border-top: 2px solid #ff3333;
            padding: 10px;
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .leaderboard.show {
            transform: translateY(0);
        }

        .leaderboard h3 {
            color: #ff3333;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: clamp(0.9rem, 4vw, 1rem);
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            border-bottom: 1px solid rgba(255, 51, 51, 0.2);
        }

        /* 結果顯示 */
        .result-box {
            text-align: center;
            padding: 15px;
            border: 2px solid #ff3333;
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.9);
        }

        .result-message {
            color: #ff3333;
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            letter-spacing: 2px;
        }

        .score {
            font-size: clamp(2.5rem, 10vw, 3rem);
            color: #ff3333;
            margin: 10px 0;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.8);
        }

        /* 提示訊息 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ff3333;
            color: white;
            padding: 15px 25px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            letter-spacing: 2px;
            z-index: 1000;
            display: none;
            text-align: center;
            width: 80%;
            max-width: 300px;
        }

        .toast.show {
            display: block;
            animation: glitchIn 0.3s ease;
        }

        /* 返回按鈕 */
        .back-button {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 100;
        }

        .back-button a {
            color: #ff3333;
            text-decoration: none;
            border: 1px solid #ff3333;
            padding: 8px 15px;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            letter-spacing: 1px;
            display: inline-block;
            background: rgba(0, 0, 0, 0.8);
        }

        /* 拍照按鈕區域 */
        .photo-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .photo-actions .btn {
            flex: 1;
            padding: 12px;
            font-size: clamp(0.9rem, 3.5vw, 1rem);
        }

        /* 動畫 */
        @keyframes glitchIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .shake {
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 橫屏模式優化 */
        @media (orientation: landscape) and (max-height: 600px) {
            .game-main {
                flex-direction: row;
            }
            
            .game-controls {
                flex-direction: row;
                flex-wrap: wrap;
            }
            
            .btn {
                width: auto;
                flex: 1;
            }
            
            .leaderboard {
                bottom: auto;
                top: 50%;
                right: 0;
                left: auto;
                transform: translateY(-50%);
                border-top: none;
                border-left: 2px solid #ff3333;
                width: 200px;
            }
        }

        /* 安全區域適配 */
        @supports (padding: max(0px)) {
            .game-container {
                padding-left: max(10px, env(safe-area-inset-left));
                padding-right: max(10px, env(safe-area-inset-right));
                padding-top: max(10px, env(safe-area-inset-top));
                padding-bottom: max(10px, env(safe-area-inset-bottom));
            }
            
            .back-button {
                top: max(10px, env(safe-area-inset-top));
                left: max(10px, env(safe-area-inset-left));
            }
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="scan-line"></div>
    <div class="noise"></div>

    <!-- 返回按鈕 -->
    <div class="back-button">
        <a href="index.html">← TERMINUS</a>
    </div>

    <!-- 成績榜（可滑出） -->
    <div class="leaderboard" id="leaderboard">
        <h3>▶ RANKING</h3>
        <div id="leaderboardList"></div>
    </div>

    <div class="game-container">
        <!-- 頂部狀態欄 -->
        <div class="status-bar">
            <div class="level-info">
                <div class="level-badge" id="currentLevel">LV 01</div>
                <div class="phase-badge" id="phaseIndicator">CAPTURE</div>
            </div>
            <div class="timer" id="timer">60s</div>
        </div>

        <!-- 相機啟動按鈕 -->
        <div class="camera-init" id="cameraInit">
            <button onclick="startCamera()">
                ▶ INIT CAMERA
            </button>
            <p style="margin-top: 15px; color: #ff3333; font-size: 0.8rem;">// ACCESS REQUIRED //</p>
        </div>

        <!-- 步驟指示器 -->
        <div class="step-indicator" id="stepIndicator" style="display: none;">
            <div class="step" id="step1">CAPTURE</div>
            <div class="step" id="step2">CONFIRM</div>
            <div class="step" id="step3">WAIT</div>
            <div class="step" id="step4">MATCH</div>
            <div class="step" id="step5">SCORE</div>
        </div>

        <!-- 遊戲主區域 -->
        <div class="game-main" id="gameMain" style="display: none;">
            <!-- 左側：題目區域 -->
            <div class="question-area">
                <div class="section-title">
                    <span>> TARGET</span>
                    <span id="questionOwner"></span>
                </div>
                <div class="image-container" id="targetImage">
                    <img id="targetImg" src="" alt="TARGET" style="display: none;">
                    <div class="placeholder" id="targetPlaceholder">
                        <i>⌛</i>
                        <p>AWAITING</p>
                    </div>
                </div>
                
                <div class="image-container" id="questionPreviewContainer" style="display: none;">
                    <div class="section-title">> YOUR SHOT</div>
                    <img id="questionPreview" src="" alt="YOUR SHOT" style="width: 100%; height: 100%; object-fit: cover;">
                </div>

                <div class="similarity-meter" id="similarityMeter" style="display: none;">
                    <div class="meter-label">MATCH RATE</div>
                    <div class="meter-bar">
                        <div class="meter-fill" id="similarityFill" style="width: 0%"></div>
                    </div>
                    <div style="text-align: center; margin-top: 8px; color: #ff3333;" id="similarityText">0%</div>
                </div>

                <div class="result-box" id="resultBox" style="display: none;">
                    <div class="result-message" id="resultMessage"></div>
                    <div class="score" id="scoreDisplay">0</div>
                </div>
            </div>

            <!-- 右側：相機區域 -->
            <div class="camera-area">
                <div class="section-title">
                    <span>> CAMERA</span>
                    <span id="cameraStatus">OFF</span>
                </div>
                <div class="image-container">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas" style="display: none;"></canvas>
                    <div class="placeholder" id="cameraPlaceholder">
                        <i>📷</i>
                        <p>OFFLINE</p>
                    </div>
                </div>

                <div class="image-container" id="photoPreviewContainer" style="display: none;">
                    <div class="section-title">> PREVIEW</div>
                    <img id="photoPreview" src="" alt="PREVIEW" style="width: 100%; height: 100%; object-fit: cover;">
                </div>

                <div class="photo-actions">
                    <button class="btn" id="takePhotoBtn" onclick="takePhoto()" disabled>📸 CAPTURE</button>
                </div>
            </div>
        </div>

        <!-- 遊戲控制按鈕 -->
        <div class="game-controls" id="gameControls" style="display: none;">
            <button class="btn" id="startGameBtn" onclick="startGame()">▶ START</button>
            <button class="btn" id="confirmQuestionBtn" onclick="confirmQuestion()" style="display: none;">✓ CONFIRM</button>
            <button class="btn" id="submitAnswerBtn" onclick="submitAnswer()" style="display: none;">⬆ SUBMIT</button>
            <button class="btn" id="nextRoundBtn" onclick="nextRound()" style="display: none;">⏭ NEXT</button>
        </div>

        <!-- 玩家列表 -->
        <div class="players-section" id="playersSection" style="display: none;">
            <h3>> OPERATORS</h3>
            <div class="players-grid" id="playersList"></div>
        </div>
    </div>

    <!-- 提示訊息 -->
    <div id="toast" class="toast"></div>

    <script>
        // 這裡放入之前完整的 JavaScript 程式碼
        // 為了節省空間，請複製之前完整版的 JavaScript 部分
        // 注意：需要把之前的所有 JavaScript 函數都複製到這裡
        
        // 為了節省回覆長度，JavaScript 部分保持不變
        // 請從之前的完整版本複製所有 JavaScript 函數到這裡
    </script>
</body>
</html>
