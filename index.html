<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Match AR! - 被選召者</title>
    <style>
        /* 引入像素風與科幻粗體字體 */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 滿屏背景，確保黑色 */
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ff0000; /* 鮮紅主色 */
        }

        /* ========================================= */
        /* 電話屏幕仿真容器 (鎖定比例 9:16) */
        /* ========================================= */
        .phone-screen {
            position: relative;
            width: 100vw;
            height: 177.78vw; /* 9:16 比例 */
            max-height: 100vh; /* 不超過螢幕高度 */
            max-width: 56.25vh; /* 對應高度的 9:16 寬度 */
            background: #050505;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2); /* 淡淡的紅光暈 */
            z-index: 1;
        }

        /* 背景：Cyberpunk 網格與掃描線 */
        .cyber-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 255, 0.02), rgba(0, 255, 0, 0.05));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* 監視器濾鏡效果 */
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(18, 16, 16, 0) 40%, rgba(0, 0, 0, 0.6) 100%),
                        repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.15) 0px, rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 10;
        }

        /* 前置攝像頭容器 (監視畫面) */
        .monitor-frame {
            position: relative;
            width: 85%;
            height: 60%;
            border: 2px solid #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            overflow: hidden;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
        }

        #userVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 監視器色調：高對比、單色 */
            filter: grayscale(100%) contrast(140%) brightness(90%) sepia(30%) hue-rotate(-30deg); 
            transform: scaleX(-1); /* 鏡像 */
            opacity: 0.9;
        }

        /* 像素風 UI 元素 */
        .status-ui {
            position: absolute;
            top: 8px; left: 8px;
            font-family: 'Press Start 2P', cursive;
            font-size: 7px;
            line-height: 1.6;
            color: #00ffff; /* 保持青色對比 */
            text-shadow: 0 0 3px #00ffff;
            pointer-events: none;
            text-align: left;
        }

        .rec-dot {
            display: inline-block;
            width: 7px; height: 7px;
            background: #ff0000;
            border-radius: 50%;
            margin-right: 4px;
            animation: blink 1s infinite;
        }

        /* ========================================= */
        /* 關鍵修改：「被選中者」文字樣式 */
        /* ========================================= */
        .chosen-one-text {
            position: absolute;
            width: 90%;
            text-align: center;
            /* 使用更粗、更有力的科幻字體 */
            font-family: 'Orbitron', sans-serif;
            font-weight: 900; /* 超粗體 */
            font-size: 20px;
            /* 關鍵：純鮮紅色 */
            color: #ff0000; 
            /* 移除所有立體和陰影效果 */
            text-shadow: none; 
            opacity: 0;
            z-index: 20;
            letter-spacing: 1px;
            line-height: 1.3;
        }

        .chosen-one-text.show {
            animation: fadeIn 0.8s forwards; /* 簡單的淡入，不使用複雜動畫 */
        }

        /* 黑色遮罩 (轉場) */
        #blackout {
            position: fixed; /* 覆蓋整個體感螢幕，不只是電話容器 */
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            opacity: 0;
            pointer-events: none;
            z-index: 100; /* 最高層級 */
            transition: opacity 1.2s ease;
        }

        /* Start 按鈕 */
        #startBtn {
            position: absolute;
            font-family: 'Press Start 2P', cursive; /* 按鈕保持像素風 */
            padding: 12px 30px;
            background: transparent;
            border: 3px solid #ff0000;
            color: #ff0000;
            font-size: 16px;
            cursor: pointer;
            opacity: 0;
            z-index: 110;
            display: none;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        #startBtn:active {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 20px #ff0000;
        }

        /* 動畫集 */
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

<div class="crt-overlay"></div>
<div id="blackout"></div>

<div class="phone-screen">
    <div class="cyber-bg"></div>

    <div class="monitor-frame" id="monitorFrame">
        <div class="status-ui">
            <span class="rec-dot"></span>REC<br>
            CAM: 01<br>
            LOC: UNKNOWN
        </div>
        <video id="userVideo" autoplay playsinline muted></video>
    </div>

    <div class="chosen-one-text" id="chosenText">
        你就是「被選中的人」<br>
        (YOU'RE THE CHOSEN ONE)
    </div>

    <button id="startBtn" onclick="nextPage()">開始  <br> (START)</button>
</div>

<script>
    const video = document.getElementById('userVideo');
    const chosenText = document.getElementById('chosenText');
    const blackout = document.getElementById('blackout');
    const startBtn = document.getElementById('startBtn');
    const monitorFrame = document.getElementById('monitorFrame');

    // 1. 開啟攝像頭
    async function initCamera() {
        try {
            // 請求前置攝像頭
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: false 
            });
            video.srcObject = stream;
            // 確保影片加載後再開始序列
            video.onloadedmetadata = () => {
                startSequence();
            };
        } catch (err) {
            console.error("無法開啟攝像頭: ", err);
            // 若失敗（如拒絕權限），依然跑流程，只是沒畫面
            startSequence();
        }
    }

    // 2. 動畫排程邏輯 (嚴格遵守時間要求)
    function startSequence() {
        // [A] 開了頁面後5秒，彈出文字
        setTimeout(() => {
            chosenText.classList.add('show');
            
            // [B] 等三秒 (總計第8秒)
            setTimeout(() => {
                // 畫面一黑
                blackout.style.opacity = '1';
                
                // [C] 黑屏持續 1.5 秒 (用於緩衝轉場)
                setTimeout(() => {
                    // 隱藏監視畫面和文字
                    monitorFrame.style.display = 'none';
                    chosenText.style.display = 'none';
                    
                    // 讓黑色遮罩慢慢淡出，露出 Start 按鈕
                    blackout.style.opacity = '0';
                    startBtn.style.display = 'block';
                    
                    // Start 按鈕緩緩浮現
                    setTimeout(() => {
                        startBtn.style.animation = 'fadeIn 1.5s forwards';
                        startBtn.style.opacity = '1';
                    }, 100);

                }, 1500); 

            }, 3000);
        }, 5000);
    }

    function nextPage() {
        // 跳轉到下一個頁面
        window.location.href = 'camera_game.html';
    }

    // 啟動
    window.onload = initCamera;
</script>

</body>
</html>
