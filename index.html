<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Match AR!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            font-family: 'Orbitron', sans-serif;
            background: #000;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }

        /* 背景效果 */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, 
                rgba(0,0,0,0.95) 0%, 
                rgba(20,20,20,0.9) 100%);
            z-index: -2;
        }

        .cyber-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 10px,
                rgba(255, 51, 51, 0.03) 10px,
                rgba(255, 51, 51, 0.03) 20px
            );
            z-index: -1;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 10;
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc0IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4wMiIgLz48L3N2Zz4=');
            opacity: 0.1;
            pointer-events: none;
            z-index: 9;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .start-screen {
            width: 100%;
            text-align: center;
            animation: fadeIn 2s ease;
        }

        .news-text {
            font-size: clamp(0.8rem, 4vw, 1.2rem);
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
            text-transform: uppercase;
            animation: flicker 3s infinite;
        }

        .main-title {
            margin-bottom: 30px;
        }

        .title-line {
            font-size: clamp(2rem, 10vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.2;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(255, 0, 0, 0.5),
                0 0 30px rgba(255, 0, 0, 0.3);
            animation: glitch 5s infinite;
        }

        .title-line.half-hour {
            color: #ff3333;
            font-size: clamp(2.5rem, 12vw, 5rem);
            letter-spacing: 5px;
        }

        .title-line.terminus {
            font-size: clamp(2.2rem, 11vw, 4.5rem);
            color: #fff;
            border: 2px solid rgba(255, 51, 51, 0.5);
            padding: 5px 10px;
            display: inline-block;
            margin: 5px 0;
        }

        .title-line.human {
            font-size: clamp(1.5rem, 8vw, 3rem);
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 8px;
        }

        .start-button {
            margin-top: 40px;
            width: 100%;
            padding: 0 20px;
        }

        .press-to-start {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            background: transparent;
            border: 3px solid #ff3333;
            color: white;
            font-size: clamp(1.2rem, 6vw, 2rem);
            font-weight: 700;
            padding: 15px 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: pulse 2s infinite;
            -webkit-appearance: none;
        }

        .press-to-start:active {
            background: #ff3333;
            color: black;
            transform: scale(0.95);
        }

        .intro-screen {
            display: none;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            animation: slideUp 0.8s ease;
        }

        .intro-content {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #ff3333;
            padding: 30px 20px;
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
            box-shadow: 0 0 50px rgba(255, 51, 51, 0.3);
        }

        .game-title {
            font-size: clamp(2rem, 8vw, 3.5rem);
            color: #ff3333;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.5);
        }

        .game-description {
            font-size: clamp(1rem, 4vw, 1.3rem);
            line-height: 1.8;
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
        }

        .highlight {
            color: #ff3333;
            font-weight: 700;
        }

        .take-photo-btn {
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            background: transparent;
            border: 3px solid #ff3333;
            color: white;
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            font-weight: 700;
            padding: 15px 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s ease;
            -webkit-appearance: none;
        }

        .take-photo-btn:active {
            background: #ff3333;
            color: black;
            transform: scale(0.95);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 51, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0); }
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,0,0,0.5), 0 0 30px rgba(255,0,0,0.3); }
            33% { text-shadow: -2px 0 rgba(255,0,0,0.8), 2px 0 rgba(0,255,255,0.8); }
            66% { text-shadow: 2px 0 rgba(255,0,0,0.8), -2px 0 rgba(0,255,255,0.8); }
        }

        @keyframes flicker {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .main-title { margin-bottom: 15px; }
            .title-line { font-size: clamp(1.5rem, 8vh, 2.5rem); }
            .title-line.half-hour { font-size: clamp(1.8rem, 9vh, 3rem); }
            .press-to-start { padding: 10px 20px; font-size: clamp(1rem, 5vh, 1.5rem); }
            .start-button { margin-top: 20px; }
        }

        @supports (padding: max(0px)) {
            .container {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-top: max(20px, env(safe-area-inset-top));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="scan-line"></div>
    <div class="noise"></div>

    <div class="container">
        <div class="start-screen" id="startScreen">
            <div class="news-text">NEWS NEWS</div>
            
            <div class="main-title">
                <div class="title-line half-hour">MATCH</div>
                <div class="title-line terminus">AR!</div>
                <div class="title-line human">PHOTO MISSION</div>
            </div>

            <div class="start-button">
                <button class="press-to-start" onclick="showIntro()">PRESS TO START</button>
            </div>
        </div>

        <div class="intro-screen" id="introScreen">
            <div class="intro-content">
                <h1 class="game-title">MATCH AR!</h1>
                
                <div class="game-description">
                    <p>📸 <span class="highlight">AUGMENTED REALITY PHOTO MISSION</span></p>
                    <p>Take photos and match with<br>
                    other players' shots<br>
                    from around the world</p>
                </div>

                <button class="take-photo-btn" onclick="startGame()">ENTER AR</button>
            </div>
        </div>
    </div>

    <script>
        function showIntro() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('introScreen').style.display = 'block';
        }

        function startGame() {
            window.location.href = 'camera_game.html';
        }

        document.addEventListener('keydown', function(e) {
            if (document.getElementById('startScreen').style.display !== 'none') {
                showIntro();
            }
        });

        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
