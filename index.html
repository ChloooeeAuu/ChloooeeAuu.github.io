<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Match AR! - 被選召者</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ff0000;
        }

        /* 電話屏幕仿真容器 */
        .phone-screen {
            position: relative;
            width: 100vw;
            height: 177.78vw; 
            max-height: 100vh; 
            max-width: 56.25vh; 
            background: #050505;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* 監視器濾鏡 */
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(18, 16, 16, 0) 40%, rgba(0, 0, 0, 0.6) 100%),
                        repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.15) 0px, rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 10;
        }

        /* 監視器外框 */
        .monitor-frame {
            position: relative;
            width: 85%;
            height: 60%;
            border: 2px solid #ff0000;
            overflow: hidden;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 3;
        }

        /* 影片背景 */
        #userVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(140%) brightness(90%) sepia(30%); 
            transform: scaleX(-1);
            opacity: 0.9;
            z-index: 1;
        }

        /* 負面怪圖片 */
        #chosenBear {
            position: relative;
            width: auto;
            max-width: 70%;
            height: auto;
            max-height: 55%;
            opacity: 0; 
            z-index: 5; 
            pointer-events: none;
            transition: opacity 1s ease;
            image-rendering: auto;
            object-fit: contain;
            margin-bottom: 10px;
        }

        /* 文字 */
        .chosen-one-text {
            position: relative;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900; 
            font-size: 18px;
            color: #ff0000; 
            text-shadow: none; 
            opacity: 0;
            z-index: 5;
            pointer-events: none;
            line-height: 1.4;
            margin-top: 5px;
            padding: 0 15px;
        }

        /* UI 文字 */
        .status-ui {
            position: absolute;
            top: 10px; left: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            color: #00ffff;
            z-index: 6;
            text-align: left;
        }

        .rec-dot {
            display: inline-block;
            width: 6px; height: 6px;
            background: #ff0000;
            border-radius: 50%;
            margin-right: 5px;
            animation: blink 1s infinite;
        }

        /* 黑色遮罩 */
        #blackout {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 1.2s ease;
        }

        /* Start 按鈕 - 置中於整個 phone-screen */
        #startBtn {
            position: absolute;
            font-family: 'Press Start 2P', cursive;
            padding: 15px 35px;
            background: transparent;
            border: 3px solid #ff0000;
            color: #ff0000;
            font-size: 18px;
            cursor: pointer;
            opacity: 0;
            z-index: 110;
            display: none;
            text-transform: uppercase;
            /* 置中於 .phone-screen */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap;
        }

        #startBtn:active {
            background: #ff0000;
            color: #000;
        }

        @keyframes blink { 50% { opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="crt-overlay"></div>
<div id="blackout"></div>

<div class="phone-screen">
    <div class="monitor-frame" id="monitorFrame">
        <!-- 影片背景 -->
        <video id="userVideo" autoplay playsinline muted></video>
        
        <!-- 圖片與文字 -->
        <img id="chosenBear" src="https://i.postimg.cc/t1pZ0LR6/fu-mian-guai02-kind1.png" alt="Chosen Monster">
        <div class="chosen-one-text" id="chosenText">
            你就是「被選中的人」<br>
            (YOU'RE THE CHOSEN ONE)
        </div>

        <!-- UI 文字 -->
        <div class="status-ui">
            <span class="rec-dot"></span>REC<br>
            CAM: 01
        </div>
    </div>

    <button id="startBtn" onclick="nextPage()">開始<br>(START)</button>
</div>

<script>
    const video = document.getElementById('userVideo');
    const chosenText = document.getElementById('chosenText');
    const bearImg = document.getElementById('chosenBear');
    const blackout = document.getElementById('blackout');
    const startBtn = document.getElementById('startBtn');
    const monitorFrame = document.getElementById('monitorFrame');

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: false 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => startSequence();
        } catch (err) {
            console.warn("Camera failed, continuing sequence.");
            startSequence();
        }
    }

    function startSequence() {
        // 開頁面後 5 秒彈出文字與照片
        setTimeout(() => {
            chosenText.style.animation = "fadeIn 1s forwards";
            chosenText.style.opacity = "1";
            bearImg.style.opacity = "1";
            
            // 等三秒 (總計 8 秒)
            setTimeout(() => {
                blackout.style.opacity = '1';
                
                // 黑屏緩衝
                setTimeout(() => {
                    monitorFrame.style.display = 'none';
                    
                    // 黑色淡出露出按鈕
                    blackout.style.opacity = '0';
                    startBtn.style.display = 'block';
                    
                    setTimeout(() => {
                        startBtn.style.animation = 'fadeIn 1.5s forwards';
                        startBtn.style.opacity = '1';
                    }, 100);
                }, 1500); 
            }, 3000);
        }, 5000);
    }

    function nextPage() {
        window.location.href = 'camera_game.html';
    }

    window.onload = initCamera;
</script>

</body>
</html>
